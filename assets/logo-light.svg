<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 120" width="310" height="120">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5B4FC" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A5B4FC" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="badge1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.15" />
    </linearGradient>
  </defs>

  <g transform="translate(16, 16)">
    <!-- Connection lines -->
    <line x1="60" y1="32" x2="80" y2="16" stroke="url(#line)" stroke-width="2" stroke-linecap="round" />
    <line x1="60" y1="56" x2="80" y2="72" stroke="url(#line)" stroke-width="2" stroke-linecap="round" />
    <line x1="28" y1="32" x2="8" y2="16" stroke="url(#line)" stroke-width="2" stroke-linecap="round" />
    <line x1="28" y1="56" x2="8" y2="72" stroke="url(#line)" stroke-width="2" stroke-linecap="round" />

    <!-- Central ring -->
    <circle cx="44" cy="44" r="20" fill="url(#brand)" />
    <circle cx="44" cy="44" r="12" fill="white" />

    <!-- Outer nodes (in front of lines) -->
    <circle cx="82" cy="14" r="5.5" fill="url(#node)" />
    <circle cx="82" cy="74" r="5.5" fill="url(#node)" />
    <circle cx="6" cy="14" r="5.5" fill="url(#node)" />
    <circle cx="6" cy="74" r="5.5" fill="url(#node)" />

    <!-- Code brackets </> -->
    <text x="44" y="48" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="800" fill="url(#brand)" text-anchor="middle" letter-spacing="-0.5">&lt;/&gt;</text>
  </g>

  <!-- OPC UA -->
  <text x="120" y="50" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="900" fill="url(#brand)" letter-spacing="-1.5">
    OPC UA
  </text>

  <!-- NodeSet Types -->
  <text x="122" y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#4F46E5" letter-spacing="0.5">
    NodeSet Types
  </text>

  <!-- Badge: 51 specs -->
  <rect x="120" y="92" width="68" height="18" rx="9" fill="url(#badge1)" />
  <text x="154" y="104" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#6366F1" text-anchor="middle" letter-spacing="1" opacity="0.7">
    51 SPECS
  </text>

  <!-- Badge: generated -->
  <rect x="194" y="92" width="88" height="18" rx="9" fill="url(#brand)" />
  <text x="238" y="104" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">
    GENERATED
  </text>
</svg>
